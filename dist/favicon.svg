<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Fondo oscuro redondeado -->
  <rect width="64" height="64" rx="14" fill="#221407"/>
  <!-- Isotipo: 3 cajas apiladas (escala proporcional al viewBox 40→64) -->
  <!-- Top box -->
  <rect x="19" y="5"  width="26" height="14" rx="3" stroke="#e9d234" stroke-width="3.2" stroke-linejoin="round"/>
  <!-- Middle box -->
  <rect x="12" y="25" width="40" height="14" rx="3" stroke="#e9d234" stroke-width="3.2" stroke-linejoin="round"/>
  <!-- Bottom box -->
  <rect x="5"  y="45" width="54" height="14" rx="3" stroke="#e9d234" stroke-width="3.2" stroke-linejoin="round"/>
</svg>
